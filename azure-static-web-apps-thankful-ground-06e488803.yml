name: Azure Static Web Apps CI/CD

trigger:
  branches:
    include:
      - master

pr:
  branches:
    include:
      - master

jobs:
  - job: build_and_deploy
    displayName: Build and Deploy Vue App
    pool:
      vmImage: ubuntu-latest

    variables:
      - group: Azure-Static-Web-Apps-thankful-ground-06e488803-variable-group

    steps:
      - checkout: self
        submodules: true

      - task: NodeTool@0
        inputs:
          versionSpec: '18.x'
        displayName: Install Node.js

      - script: |
          npm install
          npm run build
        displayName: Build Vue App

      - task: AzureStaticWebApp@0
        inputs:
          azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN_THANKFUL_GROUND_06E488803)
          app_location: '.'
          api_location: ''
          output_location: 'dist'
